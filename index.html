<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1e3c3f 0%, #315d5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 16px;
        }
        .game {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 250, 235, 0.9);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #fbf3e3;
            text-shadow: 2px 2px 0 #1f4e4d;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #294e4b;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .card {
            aspect-ratio: 1/1;
            background: #ccb185;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #6e543a;
            border: 2px solid #fbeccd;
        }
        .card.flipped {
            background: #fcf2da;
            box-shadow: 0 3px 0 #917b56;
        }
        .card.matched {
            background: #cfe6cf;
            box-shadow: 0 3px 0 #5f7a5b;
            cursor: default;
        }
        .card:not(.flipped):not(.matched) .card-content {
            display: none;
        }
        .card:not(.flipped):not(.matched)::before {
            content: "❓";
            font-size: 2.5rem;
            color: #513e28;
        }
        button {
            background: #fed89b;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #a5763a;
            margin-top: 10px;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #a5763a;
        }
        #message {
            margin: 15px 0;
            font-size: 1.3rem;
            color: #1e3c3f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game">
        <h1>🐘 MEMORY GAME 🐠</h1>
        <div class="stats">
            <span>Langkah: <span id="moves">0</span></span>
            <span>Pasangan: <span id="pairs">0</span></span>
        </div>
        <div id="message">Cari pasangan gambar!</div>
        <div class="grid" id="grid"></div>
        <button onclick="newGame()">🔄 Main Lagi</button>
    </div>

    <script>
        const emojis = ["🐼", "🦊", "🐨", "🐸", "🐧", "🐝", "🐙", "🦜"];
        let cards = [];
        let flippedCards = [];
        let lockBoard = false;
        let moves = 0;
        let pairs = 0;
        let gameFinished = false;

        function initGame() {
            cards = [...emojis, ...emojis];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            renderBoard();
        }

        function renderBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                
                const content = document.createElement('span');
                content.className = 'card-content';
                content.textContent = emoji;
                card.appendChild(content);
                
                card.addEventListener('click', () => flipCard(index));
                grid.appendChild(card);
            });
            
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = pairs;
        }

        function flipCard(index) {
            if (gameFinished || lockBoard) return;
            
            const card = document.querySelectorAll('.card')[index];
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flippedCards.push(index);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            const index1 = flippedCards[0];
            const index2 = flippedCards[1];
            const card1 = document.querySelectorAll('.card')[index1];
            const card2 = document.querySelectorAll('.card')[index2];
            
            if (cards[index1] === cards[index2]) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                pairs++;
                document.getElementById('pairs').textContent = pairs;
                flippedCards = [];
                lockBoard = false;
                
                if (pairs === emojis.length) {
                    gameFinished = true;
                    document.getElementById('message').textContent = '🏆 SELAMAT! KAMU MENANG! 🏆';
                } else {
                    document.getElementById('message').textContent = '✅ Benar! Lanjutkan!';
                }
            } else {
                document.getElementById('message').textContent = '❌ Coba lagi...';
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                    document.getElementById('message').textContent = 'Cari pasangan gambar!';
                }, 800);
            }
        }

        function newGame() {
            cards = [];
            flippedCards = [];
            lockBoard = false;
            moves = 0;
            pairs = 0;
            gameFinished = false;
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('message').textContent = 'Cari pasangan gambar!';
            initGame();
        }

        initGame();
    </script>
</body>
</html>
