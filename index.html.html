<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memori gambar · game mencocokkan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1e3c3f 0%, #315d5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-panel {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 250, 235, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px 24px 36px 24px;
            box-shadow: 0 25px 35px -8px rgba(0, 20, 15, 0.6), inset 0 0 0 1px rgba(255, 255, 200, 0.5);
            border: 1px solid #cfb784;
        }
        h1 {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fbf3e3;
            text-shadow: 3px 3px 0 #1f4e4d, 5px 5px 0 #00000030;
            margin-top: -10px;
            margin-bottom: 15px;
            text-align: center;
            word-break: break-word;
        }
        h1 span {
            background: #eac28e;
            padding: 0 16px;
            border-radius: 60px;
            font-size: 1.9rem;
            display: inline-block;
            line-height: 1.4;
            color: #1f3a3a;
            text-shadow: none;
            box-shadow: inset 0 -3px 0 #a0814e;
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #294e4b;
            margin: 10px 0 25px 0;
            padding: 12px 24px;
            border-radius: 60px;
            color: #fcf9e9;
            border: 1px solid #e6c894;
            box-shadow: inset 0 2px 5px #1e3533, 0 8px 12px -8px black;
        }
        .stats {
            display: flex;
            gap: 28px;
            font-weight: 600;
            font-size: 1.35rem;
        }
        .stats p {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats span {
            background: #1d322f;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.7rem;
            line-height: 1;
            color: #fee2b5;
            border: 1px solid #dbb16a;
            min-width: 70px;
            text-align: center;
        }
        .new-game-btn {
            background: #fed89b;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1b4a43;
            cursor: pointer;
            box-shadow: 0 5px 0 #a5763a, 0 8px 12px rgba(0,0,0,0.3);
            transition: 0.07s ease-out;
            border: 1px solid #ffefc0;
            letter-spacing: 0.5px;
        }
        .new-game-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #a5763a, 0 8px 12px rgba(0,0,0,0.2);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            justify-content: center;
            margin: 20px 0 18px;
        }
        .card {
            aspect-ratio: 1 / 1;
            background: #ccb185;
            border-radius: 30% 18% 30% 18%;
            box-shadow: 0 12px 0 #6e543a, 0 10px 18px -5px #1e2b20;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.13s ease-in-out;
            font-size: 3.5rem;
            transform: scale(1);
            border: 2px solid #fbeccd;
            color: #2f2216;
        }
            .card.flipped, .card.matched {
            background: #fcf2da;
            box-shadow: 0 6px 0 #917b56, 0 8px 16px -4px #261f12;
            transform: scale(0.98);
            border: 3px solid #ffd78b;
        }
        .card.matched {
            background: #cfe6cf;
            box-shadow: 0 6px 0 #5f7a5b, 0 8px 16px -6px #141f13;
            border: 3px solid #b4d9a2;
            cursor: default;
            filter: brightness(1.02);
            opacity: 0.85;
        }
        .card:active:not(.flipped):not(.matched) {
            transform: scale(0.94);
            box-shadow: 0 5px 0 #6e543a;
        }
        /* gambar unicode sebagai ikon */
        .card .card-content {
            font-size: 3.2rem;
            line-height: 1;
            user-select: none;
            transform: rotate(0deg);
            text-shadow: 2px 2px 3px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        /* saat kartu tertutup — tidak tampil */
        .card:not(.flipped):not(.matched) .card-content {
            display: none;
        }
        /* simbol tertutup: titik / pattern */
        .card:not(.flipped):not(.matched)::before {
            content: "❓";
            font-size: 3rem;
            opacity: 0.9;
            color: #513e28;
            text-shadow: 0 0 0 #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        /* kondisi khusus kartu matched tetap tampil gambarnya */
        .card.matched .card-content {
            display: flex;
        }
        .card.matched::before {
            content: none;  /* jangan tampilkan ❓ */
        }

        .message-area {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            background: #1c403bb3;
            color: #ffeac2;
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid #ebc180;
            backdrop-filter: blur(2px);
            margin: 10px 0 0;
            transition: all 0.2s;
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-credit {
            text-align: center;
            color: #efe2cb;
            margin-top: 18px;
            font-weight: 500;
            text-shadow: 0 2px 4px #17312e;
        }
        .footer-credit a {
            color: #ffeaaf;
            font-weight: 600;
        }
        /* responsif kecil */
        @media (max-width: 500px) {
            .grid-container { gap: 8px; }
            .card .card-content { font-size: 2.2rem; }
            .card:not(.flipped):not(.matched)::before { font-size: 2.2rem; }
            .stats { gap: 10px; font-size: 1rem; }
            .stats span { font-size: 1.3rem; min-width: 50px; }
            .new-game-btn { padding: 8px 18px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="game-panel">
        <h1><span>🐘  memori  🐠</span></h1>
        <!-- info bar -->
        <div class="top-bar">
            <div class="stats">
                <p>🎯 langkah <span id="moveCounter">0</span></p>
                <p>✔️ cocok <span id="pairCounter">0</span></p>
            </div>
            <button class="new-game-btn" id="restartBtn">🔄 main lagi</button>
        </div>

        <!-- grid kartu -->
        <div class="grid-container" id="memoryGrid"></div>

        <!-- pesan kemenangan / status -->
        <div class="message-area" id="messageDisplay">cari pasangan gambar ✨</div>
        <div class="footer-credit">⋆｡°✩  gambar unik  ✩°｡⋆</div>
    </div>

    <script>
        (function() {
            // ---- koleksi gambar (emoji/karakter) 8 pasang = 16 kartu ----
            const PAIRS = 8;
            const IMAGE_SET = [
                "🐼", "🦊", "🐨", "🐸", 
                "🐧", "🐝", "🐙", "🦜"
            ];  // 8 gambar dasar

            // variabel utama game
            let cards = [];               // array objek { id, imageId, matched, flipped? (tidak disimpan, pakai class)
            let cardElements = [];        // referensi element
            let openedCards = [];          // index kartu yang sedang terbuka (max 2)
            let lockBoard = false;         // kunci saat animasi / cek
            let moves = 0;
            let matchedPairs = 0;
            let gameFinished = false;

            // DOM elements
            const grid = document.getElementById('memoryGrid');
            const moveSpan = document.getElementById('moveCounter');
            const pairSpan = document.getElementById('pairCounter');
            const messageEl = document.getElementById('messageDisplay');
            const restartBtn = document.getElementById('restartBtn');

            // ---- inisialisasi / shuffle ----
            function initCards() {
                // buat 2 salinan tiap gambar, beri id unik
                let deck = [];
                for (let i = 0; i < PAIRS; i++) {
                    const img = IMAGE_SET[i];
                    deck.push({ id: `card-${i}-a`, imageId: i, matched: false });   // kartu A
                    deck.push({ id: `card-${i}-b`, imageId: i, matched: false });   // kartu B
                }
                // shuffle (Fisher–Yates)
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                return deck;
            }

            // update tampilan counter
            function updateStats() {
                moveSpan.textContent = moves;
                pairSpan.textContent = matchedPairs;
            }

            // cek kondisi menang
            function checkWin() {
                if (matchedPairs === PAIRS) {
                    gameFinished = true;
                    messageEl.innerHTML = '🏆 SELAMAT! semua gambar cocok! 🏆';
                } else {
                    messageEl.innerHTML = '🎯 cari pasangan...';
                }
            }

            // tutup semua kartu yang tidak matched (reset flipped)
            function closeAllUnmatched() {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(card => {
                    // jika belum matched, hapus flipped
                    if (!card.classList.contains('matched')) {
                        card.classList.remove('flipped');
                    }
                });
            }

            // bersihkan openedCards setelah delay / gagal
            function resetOpenedAfterMismatch() {
                setTimeout(() => {
                    // tutup dua kartu yang tidak matched
                    if (openedCards.length === 2) {
                        const [idxA, idxB] = openedCards;
                        const cardA = cardElements[idxA];
                        const cardB = cardElements[idxB];
                        // asalkan keduanya tidak dalam status matched
                        if (!cards[openedCards[0]].matched && !cards[openedCards[1]].matched) {
                            cardA.classList.remove('flipped');
                            cardB.classList.remove('flipped');
                        }
                    }
                    // kosongkan openedCards dan unlock
                    openedCards = [];
                    lockBoard = false;
                }, 800);
            }

            // event handling saat kartu diklik
            function handleCardClick(index) {
                // jika game selesai, board terkunci, atau kartu sudah matched atau sedang terbuka (flipped) atau lock
                if (gameFinished) return;
                if (lockBoard) return;
                if (cards[index].matched) return;
                const currentCardEl = cardElements[index];
                if (currentCardEl.classList.contains('flipped')) return;  // sudah terbuka

                // buka kartu
                currentCardEl.classList.add('flipped');
                
                // tambah ke openedCards
                openedCards.push(index);

                // cek jika sudah dua kartu terbuka
                if (openedCards.length === 2) {
                    // tambah langkah
                    moves++;
                    updateStats();

                    const idx1 = openedCards[0];
                    const idx2 = openedCards[1];
                    const card1 = cards[idx1];
                    const card2 = cards[idx2];
                    const match = (card1.imageId === card2.imageId);

                    if (match) {
                        // cocok -> set matched, ubah status
                        card1.matched = true;
                        card2.matched = true;
                        cardElements[idx1].classList.add('matched');
                        cardElements[idx2].classList.add('matched');
                        // kartu tetap flipped & matched (tidak perlu tutup)
                        matchedPairs++;
                        pairSpan.textContent = matchedPairs;

                        // kosongkan openedCards, unlock (karena langsung sukses)
                        openedCards = [];
                        // tidak lock, tapi cek apakah sudah menang
                        checkWin();
                        // jika menang, gameFinished sudah true
                    } else {
                        // tidak cocok: lock papan, atur timer untuk tutup
                        lockBoard = true;
                        resetOpenedAfterMismatch();
                    }
                    // dalam kedua kasus, setelah dua kartu terbuka kita selalu cek kemenangan (match sudah menambah)
                    // tapi untuk mismatch, timer akan handle unlock.
                } else {
                    // hanya satu kartu terbuka, tidak apa2.
                }
            }

            // render grid dari array cards
            function renderBoard() {
                grid.innerHTML = '';            // kosongkan grid
                cardElements = [];               // reset referensi
                for (let i = 0; i < cards.length; i++) {
                    const cardData = cards[i];
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    if (cardData.matched) {
                        cardDiv.classList.add('matched', 'flipped');   // kartu matched juga flipped agar gambar tampil
                    }
                    // data atribut index
                    cardDiv.dataset.index = i;

                    // isi content gambar (card-content)
                    const contentSpan = document.createElement('span');
                    contentSpan.className = 'card-content';
                    contentSpan.textContent = IMAGE_SET[cardData.imageId];  // ambil gambar sesuai imageId
                    cardDiv.appendChild(contentSpan);

                    // event listener
                    cardDiv.addEventListener('click', function(e) {
                        const idx = parseInt(this.dataset.index, 10);
                        handleCardClick(idx);
                    });

                    grid.appendChild(cardDiv);
                    cardElements.push(cardDiv);
                }
            }

            // reset / new game
            function newGame() {
                // reset data
                cards = initCards();
                openedCards = [];
                lockBoard = false;
                gameFinished = false;
                moves = 0;
                matchedPairs = 0;
                updateStats();
                messageEl.innerHTML = '🎯 cari pasangan...';
                // render ulang
                renderBoard();
            }

            // pasang event restart
            restartBtn.addEventListener('click', () => {
                newGame();
            });

            // jalankan pertama kali
            newGame();

            // optional: menjaga agar tidak ada kebocoran jika cepat klik (lockBoard sudah menangani)
            // tapi kita tambah safeguard untuk mencegah flip ganda pada kartu yang sama saat terbuka
            // sudah dicegah dengan pengecekan class flipped.

            // menambahkan sentuhan: jika semua kartu matched, tampilkan win, dan tidak bisa klik.
            // handleCardClick sudah ada pengecekan gameFinished.

        })();
    </script>
</body>
</html>
